<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>仕込み計算</title>

<style>
  body { font-family: system-ui; margin: 20px; }
  .card { max-width: 860px; margin: auto; padding: 16px; border: 1px solid #ddd; border-radius: 12px; }

  h3 { margin: 18px 0 8px; }

  .grid {
    display: grid;
    grid-template-columns: 120px 1fr 1fr;
    gap: 8px 12px;
    align-items: center;
  }

  .expr { text-align: right; font-weight: bold; }

  .date {
    font-size: 12px;
    border: 1px solid #ddd;
    padding: 2px 8px;
    border-radius: 999px;
    text-align: center;
  }

  .date.sat {
    color: #0066cc;
  }

  .date.sun,
  .date.holiday {
    color: #cc0000;
  }

  .bigrow {
    display:flex;
    justify-content: space-between;
    padding: 8px 0;
    border-top: 1px solid #eee;
  }

  .big { font-size: 22px; font-weight: bold; }

  .section {
    border: 1px solid #ccc;
    padding: 10px;
    margin-bottom: 12px;
    border-radius: 8px;
  }

  .section-title {
    font-weight: bold;
    margin-bottom: 6px;
    font-size: 18px;
  }

  .input-group { margin-bottom: 10px; }
  .input-group label { display: block; font-size: 14px; margin-bottom: 2px; }

  .input-group input,
  .input-group select {
    width: 100%;
    max-width: 250px;
    padding: 8px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: #fff;
  }

  .other-row{
    display:flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-top: 1px solid #eee;
    gap: 12px;
  }

  .other-left{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }

  .formula{
    font-size:13px;
    color:#666;
    white-space:nowrap;
  }

  .meat-wrap {
    margin-top: 20px;
  }

  .debug-wrap { margin-bottom: 12px; }
  .debug-row {
    display:flex;
    align-items:center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .debug-grid {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 8px 12px;
    margin-top: 10px;
  }
  .debug-grid label { font-size: 14px; }
  .debug-grid input[type="date"] {
    width: 100%;
    max-width: 250px;
    padding: 6px;
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 8px;
  }
  .muted { font-size: 12px; color: #666; }
  .hidden { display:none; }

  .debug-preview {
    margin-top: 8px;
    font-size: 14px;
  }
  .debug-preview .row{
    display:flex;
    gap: 10px;
    padding: 2px 0;
  }
  .debug-preview .k{
    width: 90px;
    color: #444;
  }
  .debug-preview .v{
    font-weight: 600;
  }

  .debug-option {
    margin-top: 10px;
    font-size: 14px;
  }
  .debug-option label {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .advanced-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
    margin-top: 10px;
  }

  .advanced-col {
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 10px;
  }

  .advanced-col-title {
    font-weight: bold;
    margin-bottom: 8px;
    font-size: 14px;
  }

  .advanced-col-title.sat {
    color: #0066cc;
  }

  .advanced-col-title.sun,
  .advanced-col-title.holiday {
    color: #cc0000;
  }

  .advanced-item {
    margin-bottom: 10px;
  }

  .advanced-item label {
    display: block;
    font-size: 13px;
    margin-bottom: 4px;
  }

  .advanced-item input {
    width: 100%;
    max-width: 100%;
    padding: 8px;
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 8px;
    box-sizing: border-box;
  }

  .assign-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-top: 16px;
  }

  .assign-item {
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 10px;
  }

  .assign-item label {
    display: block;
    font-size: 13px;
    margin-bottom: 6px;
    font-weight: 600;
  }

  .assign-item select {
    width: 100%;
    padding: 8px;
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: #fff;
  }

  @media (max-width: 900px) {
    .assign-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 700px) {
    .advanced-grid,
    .assign-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

<body>
<div class="card">

<h2>仕込み計算</h2>

<!-- デバッグ -->
<div class="section debug-wrap">
  <div class="section-title">デバッグ</div>

  <div class="debug-row">
    <label style="display:flex;align-items:center;gap:8px;">
      <input id="debugToggle" type="checkbox">
      デバッグモード
    </label>
    <span class="muted">ONのとき「本日（基準日）」を入れると、明日/明後日/明々後日を自動設定します</span>
  </div>

  <div id="debugPanel" class="hidden">
    <div class="debug-grid">
      <label for="dbg_base">本日（基準日）</label>
      <div>
        <input id="dbg_base" type="date">

        <div class="debug-preview">
          <div class="row"><div class="k">明日</div><div class="v" id="dbg_show_d1">-</div></div>
          <div class="row"><div class="k">明後日</div><div class="v" id="dbg_show_d2">-</div></div>
          <div class="row"><div class="k">明々後日</div><div class="v" id="dbg_show_d3">-</div></div>
        </div>

        <div class="debug-option">
          <label>
            <input id="dbg_use_plan" type="checkbox" checked>
            粉で予定値を引く
          </label>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 入力：粉 -->
<div class="section">
  <div class="section-title">粉</div>

  <div class="input-group">
    <label>からあげ</label>
    <input id="kara1" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="17時時点の在庫">
  </div>

  <div class="input-group">
    <label>ちびから</label>
    <input id="chibi1" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="17時時点の在庫">
  </div>
</div>

<!-- 入力：下味 -->
<div class="section">
  <div class="section-title">下味</div>

  <div class="input-group">
    <label>からあげ</label>
    <input id="kara2" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="17時時点の在庫">
  </div>

  <div class="input-group">
    <label>ちびから</label>
    <input id="chibi2" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="17時時点の在庫">
  </div>
</div>

<!-- 入力：その他 -->
<div class="section">
  <div class="section-title">その他</div>

  <div class="input-group">
    <label>スティック</label>
    <input id="stick" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="17時時点の在庫">
  </div>

  <div class="input-group">
    <label>塩からあげ</label>
    <input id="shio" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="17時時点の在庫">
  </div>

  <div class="input-group">
    <label>旨辛</label>
    <input id="umakara" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="17時時点の在庫">
  </div>
</div>

<!-- 粉 -->
<h3>粉</h3>
<div class="grid">
  <div></div>
  <div class="date" id="d1">-</div>
  <div class="date" id="d2">-</div>

  <div>からあげ</div>
  <div class="expr" id="k_s1">-</div>
  <div class="expr" id="k_s2">-</div>

  <div>ちびから</div>
  <div class="expr" id="c_s1">-</div>
  <div class="expr" id="c_s2">-</div>
</div>

<div class="bigrow">
  <div>本日　粉つけ（からあげ）</div>
  <div class="big" id="k_out2">-</div>
</div>
<div class="bigrow">
  <div>本日　粉つけ（ちびから）</div>
  <div class="big" id="c_out2">-</div>
</div>

<hr>

<!-- 下味 -->
<h3>下味</h3>
<div class="grid">
  <div></div>
  <div class="date" id="d3a">-</div>
  <div class="date" id="d3b">-</div>

  <div>からあげ</div>
  <div class="expr" id="k_s3">-</div>
  <div class="expr" id="k_s4">-</div>

  <div>ちびから</div>
  <div class="expr" id="c_s3">-</div>
  <div class="expr" id="c_s4">-</div>
</div>

<div class="bigrow">
  <div>本日　下味（からあげ）</div>
  <div class="big" id="k_out4">-</div>
</div>
<div class="bigrow">
  <div>本日　下味（ちびから）</div>
  <div class="big" id="c_out4">-</div>
</div>

<hr>

<!-- その他 -->
<h3>その他</h3>

<div class="other-row">
  <div class="other-left">
    <div>スティック</div>
    <div class="formula" id="stick_formula"></div>
  </div>
  <div class="big" id="stick_out">-</div>
</div>

<div class="other-row">
  <div class="other-left">
    <div>塩からあげ</div>
    <div class="formula" id="shio_formula"></div>
  </div>
  <div class="big" id="shio_out">-</div>
</div>

<div class="other-row">
  <div class="other-left">
    <div>旨辛</div>
    <div class="formula" id="umakara_formula"></div>
  </div>
  <div class="big" id="umakara_out">-</div>
</div>

<!-- 肉の仕込み量 -->
<div class="meat-wrap">
  <div class="other-row">
    <div>カット</div>
    <div class="big" id="cut_out">-</div>
  </div>

  <div class="other-row">
    <div>正肉</div>
    <div class="big" id="seiniku_out">-</div>
  </div>

  <div class="other-row">
    <div>ムネ</div>
    <div class="big" id="mune_out">-</div>
  </div>
</div>

<!-- 高度な設定 -->
<div class="section" style="margin-top:20px;">
  <div class="section-title">高度な設定</div>

  <div class="advanced-grid">
    <div class="advanced-col">
      <div class="advanced-col-title" id="adv_title_d1">-</div>

      <div class="advanced-item">
        <label for="plan_d1_kara">からあげの予定値</label>
        <input id="plan_d1_kara" type="number" inputmode="numeric" pattern="[0-9]*">
      </div>

      <div class="advanced-item">
        <label for="plan_d1_chibi">ちびからの予定値</label>
        <input id="plan_d1_chibi" type="number" inputmode="numeric" pattern="[0-9]*">
      </div>
    </div>

    <div class="advanced-col">
      <div class="advanced-col-title" id="adv_title_d2">-</div>

      <div class="advanced-item">
        <label for="plan_d2_kara">からあげの予定値</label>
        <input id="plan_d2_kara" type="number" inputmode="numeric" pattern="[0-9]*">
      </div>

      <div class="advanced-item">
        <label for="plan_d2_chibi">ちびからの予定値</label>
        <input id="plan_d2_chibi" type="number" inputmode="numeric" pattern="[0-9]*">
      </div>
    </div>

    <div class="advanced-col">
      <div class="advanced-col-title" id="adv_title_d3">-</div>

      <div class="advanced-item">
        <label for="plan_d3_kara">からあげの予定値</label>
        <input id="plan_d3_kara" type="number" inputmode="numeric" pattern="[0-9]*">
      </div>

      <div class="advanced-item">
        <label for="plan_d3_chibi">ちびからの予定値</label>
        <input id="plan_d3_chibi" type="number" inputmode="numeric" pattern="[0-9]*">
      </div>
    </div>
  </div>

  <div class="assign-grid">
    <div class="assign-item">
      <label for="assign_kara">からあげ</label>
      <select id="assign_kara">
        <option value="cut">カット</option>
        <option value="seiniku">正肉</option>
      </select>
    </div>

    <div class="assign-item">
      <label for="assign_chibi">ちびから</label>
      <select id="assign_chibi">
        <option value="cut">カット</option>
        <option value="seiniku">正肉</option>
      </select>
    </div>

    <div class="assign-item">
      <label for="assign_shio">塩からあげ</label>
      <select id="assign_shio">
        <option value="cut">カット</option>
        <option value="seiniku">正肉</option>
      </select>
    </div>

    <div class="assign-item">
      <label for="assign_umakara">旨辛</label>
      <select id="assign_umakara">
        <option value="cut">カット</option>
        <option value="seiniku">正肉</option>
      </select>
    </div>
  </div>
</div>

</div>

<script>
const el = (id) => document.getElementById(id);

const debugToggle = el("debugToggle");
const debugPanel  = el("debugPanel");
const dbg_base    = el("dbg_base");
const dbg_use_plan = el("dbg_use_plan");

const dbg_show_d1 = el("dbg_show_d1");
const dbg_show_d2 = el("dbg_show_d2");
const dbg_show_d3 = el("dbg_show_d3");

const kara1 = el("kara1");
const chibi1 = el("chibi1");
const kara2 = el("kara2");
const chibi2 = el("chibi2");
const shio = el("shio");
const stick = el("stick");
const umakara = el("umakara");

const d1El = el("d1");
const d2El = el("d2");
const d3aEl = el("d3a");
const d3bEl = el("d3b");

const k_s1 = el("k_s1");
const k_s2 = el("k_s2");
const k_s3 = el("k_s3");
const k_s4 = el("k_s4");

const c_s1 = el("c_s1");
const c_s2 = el("c_s2");
const c_s3 = el("c_s3");
const c_s4 = el("c_s4");

const k_out2 = el("k_out2");
const c_out2 = el("c_out2");
const k_out4 = el("k_out4");
const c_out4 = el("c_out4");

const shio_out = el("shio_out");
const stick_out = el("stick_out");
const umakara_out = el("umakara_out");

const shio_formula = el("shio_formula");
const stick_formula = el("stick_formula");
const umakara_formula = el("umakara_formula");

const cut_out = el("cut_out");
const seiniku_out = el("seiniku_out");
const mune_out = el("mune_out");

const plan_d1_kara = el("plan_d1_kara");
const plan_d1_chibi = el("plan_d1_chibi");
const plan_d2_kara = el("plan_d2_kara");
const plan_d2_chibi = el("plan_d2_chibi");
const plan_d3_kara = el("plan_d3_kara");
const plan_d3_chibi = el("plan_d3_chibi");

const adv_title_d1 = el("adv_title_d1");
const adv_title_d2 = el("adv_title_d2");
const adv_title_d3 = el("adv_title_d3");

const assign_kara = el("assign_kara");
const assign_chibi = el("assign_chibi");
const assign_shio = el("assign_shio");
const assign_umakara = el("assign_umakara");

const API = "https://date.nager.at/api/v3/PublicHolidays/";

let currentKaraShitami = null;
let currentChibiShitami = null;
let currentShio = null;
let currentStick = null;
let currentUmakara = null;

function kgNum(n){ return `${n}kg`; }
function kgPair(a, b){ return `${b}kg（${a}kg）`; }

function dateOnly(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function addDays(d, days){
  const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  x.setDate(x.getDate() + days);
  return dateOnly(x);
}
function getDateFromNow(offset){ return addDays(new Date(), offset); }

function format(d){
  const w = ["日","月","火","水","木","金","土"];
  return `${d.getMonth()+1}/${d.getDate()}(${w[d.getDay()]})`;
}

function formatDateWithWeekday(d){
  const w = ["日","月","火","水","木","金","土"];
  return `${d.getMonth()+1}/${d.getDate()}（${w[d.getDay()]}）`;
}

function applyWeekendColor(targetEl, d){
  targetEl.classList.remove("sat", "sun", "holiday");

  if(isHoliday(d) || d.getDay() === 0){
    targetEl.classList.add("holiday");
  }else if(d.getDay() === 6){
    targetEl.classList.add("sat");
  }
}

function localDateKey(d){
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function parseDateInput(v){
  if(!v) return null;
  const [y,m,day] = v.split("-").map(Number);
  if(!y || !m || !day) return null;
  return new Date(y, m-1, day);
}

let d0 = dateOnly(getDateFromNow(0));
let dN = dateOnly(getDateFromNow(1));
let d1 = dateOnly(getDateFromNow(1));
let d2 = dateOnly(getDateFromNow(2));
let d3 = dateOnly(getDateFromNow(3));

function applyDatesToUI(){
  d1El.textContent = format(d1);
  d2El.textContent = format(d2);
  d3aEl.textContent = format(d3);
  d3bEl.textContent = format(d3);

  applyWeekendColor(d1El, d1);
  applyWeekendColor(d2El, d2);
  applyWeekendColor(d3aEl, d3);
  applyWeekendColor(d3bEl, d3);
}

function applyDebugPreview(){
  dbg_show_d1.textContent = format(d1);
  dbg_show_d2.textContent = format(d2);
  dbg_show_d3.textContent = format(d3);
}

function applyAdvancedTitles(){
  adv_title_d1.textContent = formatDateWithWeekday(d1);
  adv_title_d2.textContent = formatDateWithWeekday(d2);
  adv_title_d3.textContent = formatDateWithWeekday(d3);

  applyWeekendColor(adv_title_d1, d1);
  applyWeekendColor(adv_title_d2, d2);
  applyWeekendColor(adv_title_d3, d3);
}

const holidays = new Set();
let ready = false;

async function loadHolidaysForYears(years){
  holidays.clear();
  ready = false;
  const uniq = Array.from(new Set(years)).filter(Boolean);

  for(const y of uniq){
    const res = await fetch(API + y + "/JP");
    const data = await res.json();
    data.forEach(v => holidays.add(v.date));
  }
  ready = true;
}

function isHoliday(d){
  return ready && holidays.has(localDateKey(d));
}
function isWeekend(d){
  const day = d.getDay();
  return day === 0 || day === 6;
}

function fk(d){ return (isWeekend(d)||isHoliday(d)) ? 24 : 14; }
function fc(d){ return (isWeekend(d)||isHoliday(d)) ? 12 : 6; }

function pk(d){ return (isWeekend(d)||isHoliday(d)) ? 8 : 4; }
function pc(d){ return (isWeekend(d)||isHoliday(d)) ? 4 : 2; }

function roundTo4Unit(n){
  if(n <= 0) return 0;
  if(n <= 2) return 0;
  if(n <= 5) return 4;
  if(n <= 9) return 8;
  if(n <= 13) return 12;
  if(n <= 17) return 16;
  if(n <= 21) return 20;
  if(n <= 25) return 24;
  if(n <= 29) return 28;
  if(n <= 33) return 32;
  if(n <= 37) return 36;
  if(n <= 41) return 40;
  return n;
}

function shouldUsePlanForPowder(){
  if(!debugToggle.checked) return true;
  return dbg_use_plan.checked;
}

function planVal(inputEl, fallback){
  const v = Number(inputEl.value);
  return Number.isFinite(v) ? v : fallback;
}

function getKaraPlanD1(){ return planVal(plan_d1_kara, fk(d1)); }
function getChibiPlanD1(){ return planVal(plan_d1_chibi, fc(d1)); }
function getKaraPlanD2(){ return planVal(plan_d2_kara, fk(d2)); }
function getChibiPlanD2(){ return planVal(plan_d2_chibi, fc(d2)); }
function getKaraPlanD3(){ return planVal(plan_d3_kara, fk(d3)); }
function getChibiPlanD3(){ return planVal(plan_d3_chibi, fc(d3)); }

function fillDefaultAdvancedPlans(){
  plan_d1_kara.value = fk(d1);
  plan_d1_chibi.value = fc(d1);
  plan_d2_kara.value = fk(d2);
  plan_d2_chibi.value = fc(d2);
  plan_d3_kara.value = fk(d3);
  plan_d3_chibi.value = fc(d3);
}

function fillDefaultAssignments(){
  assign_kara.value = "cut";
  assign_chibi.value = "seiniku";
  assign_shio.value = "seiniku";
  assign_umakara.value = "cut";
}

function calc(a,b,f1,f2,f3,p1,s1,s2,s3,s4,o2,o4){
  if(a === "" || a === null || a === undefined){
    s1.textContent=s2.textContent=s3.textContent=s4.textContent=o2.textContent=o4.textContent="-";
    return { powder: null, shitami: null };
  }
  a = Number(a);
  if(!Number.isFinite(a)){
    s1.textContent=s2.textContent=s3.textContent=s4.textContent=o2.textContent=o4.textContent="-";
    return { powder: null, shitami: null };
  }

  const aAdj = shouldUsePlanForPowder() ? (a - p1) : a;
  const step1 = aAdj - f1;
  const step2 = f2 - step1;

  s1.textContent = `${aAdj}-${f1}=${step1}`;
  s2.textContent = `${f2}-${step1}=${step2}`;
  o2.textContent = kgNum(step2);

  if(b === "" || b === null || b === undefined){
    s3.textContent=s4.textContent=o4.textContent="-";
    return { powder: step2, shitami: null };
  }
  b = Number(b);
  if(!Number.isFinite(b)){
    s3.textContent=s4.textContent=o4.textContent="-";
    return { powder: step2, shitami: null };
  }

  const bAdj = b;
  const step3 = bAdj - step2;
  const step4 = f3 - step3;

  s3.textContent = `${bAdj}-${step2}=${step3}`;
  s4.textContent = `${f3}-${step3}=${step4}`;

  const rounded = roundTo4Unit(step4);
  o4.textContent = kgPair(rounded, step4);

  return { powder: step2, shitami: rounded };
}

function convertStick(n){
  if(n <= 3) return 12;
  if(n <= 10) return 6;
  return 0;
}

function calcStick(){
  if(stick.value === ""){
    stick_out.textContent="-";
    stick_formula.textContent="";
    currentStick = null;
    return;
  }
  const x = Number(stick.value);
  if(!Number.isFinite(x)){
    stick_out.textContent="-";
    stick_formula.textContent="";
    currentStick = null;
    return;
  }

  const plan  = (isWeekend(d0) || isHoliday(d0)) ? 6 : 3;
  const fixed = (isWeekend(dN) || isHoliday(dN)) ? 12 : 6;

  const raw = (x - plan) - fixed;
  const converted = (raw < 0) ? 18 : convertStick(raw);

  stick_formula.textContent = `${x}-${plan}-${fixed}=${raw}`;
  stick_out.textContent = `${converted}kg`;
  currentStick = converted;
}

function calcShio(){
  if(shio.value === ""){
    shio_out.textContent="-";
    shio_formula.textContent="";
    currentShio = null;
    return;
  }
  const x = Number(shio.value);
  if(!Number.isFinite(x)){
    shio_out.textContent="-";
    shio_formula.textContent="";
    currentShio = null;
    return;
  }

  let minus;
  if(isWeekend(d1) || isHoliday(d1)){
    minus = 4;
  }else{
    minus = 2;
  }

  const raw = x - minus;
  const ans = (raw <= 4) ? 4 : 0;

  shio_formula.textContent = `${x}-${minus}=${raw}`;
  shio_out.textContent = kgNum(ans);
  currentShio = ans;
}

function calcUmakara(){
  if(umakara.value === ""){
    umakara_out.textContent="-";
    umakara_formula.textContent="";
    currentUmakara = null;
    return;
  }
  const x = Number(umakara.value);
  if(!Number.isFinite(x)){
    umakara_out.textContent="-";
    umakara_formula.textContent="";
    currentUmakara = null;
    return;
  }

  const raw = x - 2;
  const ans = (raw <= 2) ? 2 : 0;

  umakara_formula.textContent = `${x}-2=${raw}`;
  umakara_out.textContent = kgNum(ans);
  currentUmakara = ans;
}

function calcMeat(){
  let cut = 0;
  let seiniku = 0;
  let hasCut = false;
  let hasSeiniku = false;

  if(currentKaraShitami !== null){
    if(assign_kara.value === "cut"){
      cut += currentKaraShitami / 2;
      hasCut = true;
    }else{
      seiniku += currentKaraShitami / 2;
      hasSeiniku = true;
    }
  }

  if(currentChibiShitami !== null){
    if(assign_chibi.value === "cut"){
      cut += currentChibiShitami / 2;
      hasCut = true;
    }else{
      seiniku += currentChibiShitami / 2;
      hasSeiniku = true;
    }
  }

  if(currentShio !== null){
    if(assign_shio.value === "cut"){
      cut += currentShio / 2;
      hasCut = true;
    }else{
      seiniku += currentShio / 2;
      hasSeiniku = true;
    }
  }

  if(currentUmakara !== null){
    if(assign_umakara.value === "cut"){
      cut += currentUmakara / 2;
      hasCut = true;
    }else{
      seiniku += currentUmakara / 2;
      hasSeiniku = true;
    }
  }

  cut_out.textContent = hasCut ? String(cut) : "-";
  seiniku_out.textContent = hasSeiniku ? String(seiniku) : "-";

  if(currentStick === null){
    mune_out.textContent = "-";
  }else{
    const mune = currentStick / 2;
    mune_out.textContent = String(mune);
  }
}

function update(){
  const karaResult = calc(
    kara1.value, kara2.value,
    getKaraPlanD1(), getKaraPlanD2(), getKaraPlanD3(),
    pk(d0),
    k_s1, k_s2, k_s3, k_s4,
    k_out2, k_out4
  );

  const chibiResult = calc(
    chibi1.value, chibi2.value,
    getChibiPlanD1(), getChibiPlanD2(), getChibiPlanD3(),
    pc(d0),
    c_s1, c_s2, c_s3, c_s4,
    c_out2, c_out4
  );

  currentKaraShitami = karaResult.shitami;
  currentChibiShitami = chibiResult.shitami;

  calcStick();
  calcShio();
  calcUmakara();
  calcMeat();
}

async function applyDatesFromMode(){
  const debug = debugToggle.checked;

  if(debug){
    const base = parseDateInput(dbg_base.value);
    if(base){
      d0 = dateOnly(base);
      dN = addDays(d0, 1);
      d1 = addDays(d0, 1);
      d2 = addDays(d0, 2);
      d3 = addDays(d0, 3);
    }
  }else{
    d0 = dateOnly(getDateFromNow(0));
    dN = dateOnly(getDateFromNow(1));
    d1 = dateOnly(getDateFromNow(1));
    d2 = dateOnly(getDateFromNow(2));
    d3 = dateOnly(getDateFromNow(3));
  }

  await loadHolidaysForYears([
    d0.getFullYear(),
    dN.getFullYear(),
    d1.getFullYear(),
    d2.getFullYear(),
    d3.getFullYear()
  ]);

  applyDatesToUI();
  applyAdvancedTitles();

  if(debug){
    applyDebugPreview();
  }else{
    dbg_show_d1.textContent = "-";
    dbg_show_d2.textContent = "-";
    dbg_show_d3.textContent = "-";
  }

  fillDefaultAdvancedPlans();
  fillDefaultAssignments();
  update();
}

[
  kara1, chibi1, kara2, chibi2,
  stick, shio, umakara,
  plan_d1_kara, plan_d1_chibi,
  plan_d2_kara, plan_d2_chibi,
  plan_d3_kara, plan_d3_chibi,
  assign_kara, assign_chibi, assign_shio, assign_umakara
].forEach(inp => {
  inp.addEventListener("input", update);
  inp.addEventListener("change", update);
});

debugToggle.addEventListener("change", async ()=>{
  if(debugToggle.checked){
    debugPanel.classList.remove("hidden");
    dbg_base.value = localDateKey(d0);
  }else{
    debugPanel.classList.add("hidden");
  }
  await applyDatesFromMode();
});

dbg_use_plan.addEventListener("change", update);
dbg_base.addEventListener("change", applyDatesFromMode);

(async()=>{
  fillDefaultAssignments();
  await loadHolidaysForYears([
    d0.getFullYear(),
    dN.getFullYear(),
    d1.getFullYear(),
    d2.getFullYear(),
    d3.getFullYear()
  ]);
  applyDatesToUI();
  applyAdvancedTitles();
  fillDefaultAdvancedPlans();
  update();
})();
</script>
